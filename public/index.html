<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG AdminPanel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<style>
:root {
  /* Base */
  --bg:    #080a12;
  --bg2:   #0d0f1c;
  --bg3:   #111322;
  --card:  #141728;
  --card2: #181b2e;
  --b1:    rgba(255,255,255,0.06);
  --b2:    rgba(255,255,255,0.1);
  --b3:    rgba(255,255,255,0.16);
  /* Brand */
  --vi:  #7c6ff7;
  --vi2: #6055e0;
  --cy:  #38bdf8;
  --gr:  #34d399;
  --re:  #fb7185;
  --am:  #fbbf24;
  --grad: linear-gradient(135deg, #7c6ff7 0%, #38bdf8 100%);
  --glow: 0 0 40px rgba(124,111,247,0.25);
  /* Text */
  --t1: #f1f1f8;
  --t2: #6e7490;
  --t3: #373d5a;
  /* Fonts */
  --sans: 'Geist', -apple-system, sans-serif;
  --mono: 'Geist Mono', 'JetBrains Mono', monospace;
  /* Motion */
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --tx: 0.2s var(--ease);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── SCROLLBAR ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--b3); }

/* ─── LAYOUT ────────────────────────────────────────────── */
.app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ───────────────────────────────────────────── */
.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--tx);
}

.sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--b1);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 34px; height: 34px;
  background: var(--grad);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(124,111,247,0.4);
}
.logo-icon svg { width: 18px; height: 18px; color: #fff; }
.logo-texts {}
.logo-name {
  font-size: 14px; font-weight: 600; letter-spacing: -0.2px;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 10px; color: var(--t3); margin-top: 1px; font-family: var(--mono); }

.nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav-section { font-size: 10px; font-weight: 600; color: var(--t3); letter-spacing: 1.2px; text-transform: uppercase; padding: 12px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 12px; border-radius: 8px;
  cursor: pointer; font-size: 14px; font-weight: 400;
  color: var(--t2); transition: all var(--tx);
  margin-bottom: 2px; user-select: none;
  position: relative; border: 1px solid transparent;
}
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-item:hover { background: var(--card); color: var(--t1); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(124,111,247,0.15) 0%, rgba(56,189,248,0.06) 100%);
  color: var(--t1);
  border-color: rgba(124,111,247,0.2);
}
.nav-item.active::before {
  content: '';
  position: absolute; left: -1px; top: 25%; bottom: 25%;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--grad);
}
.nav-badge {
  margin-left: auto;
  background: var(--b1); color: var(--t2);
  font-size: 10px; font-weight: 600;
  padding: 1px 7px; border-radius: 10px;
  font-family: var(--mono);
}
.nav-item.active .nav-badge { background: rgba(124,111,247,0.2); color: var(--vi); }

/* VERSION BLOCK */
/* version sidebar btn */
.version-sidebar-btn {
  margin: 0 8px 8px;
  width: calc(100% - 16px);
  padding: 9px 12px; border-radius: 9px;
  background: var(--card); border: 1px solid var(--b2);
  color: var(--t2); cursor: pointer;
  font-size: 12px; font-weight: 500; font-family: var(--sans);
  display: flex; align-items: center; gap: 8px;
  transition: all var(--tx);
}
.version-sidebar-btn:hover { background: var(--card2); color: var(--t1); border-color: var(--b3); }
.version-sidebar-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.version-sidebar-tag {
  margin-left: auto;
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  padding: 1px 6px; border-radius: 5px;
}
.version-sidebar-tag.ok   { background: rgba(52,211,153,0.12); color: var(--gr); }
.version-sidebar-tag.warn { background: rgba(251,191,36,0.12);  color: var(--am); }
.version-sidebar-tag.load { background: var(--b1); color: var(--t3); }

/* version modal table */
.ver-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
.ver-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 500; color: var(--t3); text-transform: uppercase; letter-spacing: .7px; border-bottom: 1px solid var(--b1); }
.ver-table td { padding: 11px 12px; border-bottom: 1px solid var(--b1); vertical-align: middle; }
.ver-table tr:last-child td { border-bottom: none; }
.ver-table tbody tr:hover td { background: rgba(124,111,247,0.04); }

/* node status badge checked via SSH every 20s */

/* node info tooltip */
.node-info-row {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--b1);
  font-size: 11px; color: var(--t3); font-family: var(--mono);
  line-height: 1.8;
  animation: pg-in .15s var(--ease);
}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--b1);
}
.sidebar-footer-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.sidebar-stat { font-size: 11px; color: var(--t3); }
.sidebar-stat span { color: var(--t2); font-weight: 500; }

/* ─── MAIN ──────────────────────────────────────────────── */
.main {
  margin-left: 240px; flex: 1;
  padding: 28px 32px;
  max-width: calc(100vw - 240px);
  min-height: 100vh;
}

/* ─── TOPBAR ────────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.topbar-left {}
.page-title {
  font-size: 22px; font-weight: 600; letter-spacing: -0.5px;
}
.page-title em {
  font-style: normal;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.page-desc { font-size: 13px; color: var(--t3); margin-top: 3px; font-family: var(--mono); }
.topbar-right { display: flex; align-items: center; gap: 8px; }

/* ─── BUTTONS ───────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 9px; border: none;
  cursor: pointer; font-size: 14px; font-weight: 500;
  transition: all var(--tx); font-family: var(--sans);
  white-space: nowrap; line-height: 1;
}
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.btn-primary {
  background: var(--grad); color: #fff;
  box-shadow: 0 0 20px rgba(124,111,247,0.3);
}
.btn-primary:hover { opacity: 0.87; transform: translateY(-1px); box-shadow: 0 0 32px rgba(124,111,247,0.45); }
.btn-secondary {
  background: var(--card2); color: var(--t1);
  border: 1px solid var(--b2);
}
.btn-secondary:hover { background: var(--card); border-color: var(--b3); }
.btn-ghost { background: transparent; color: var(--t2); border: 1px solid var(--b2); }
.btn-ghost:hover { background: var(--card); color: var(--t1); }
.btn-danger { background: transparent; color: var(--re); border: 1px solid rgba(251,113,133,0.2); }
.btn-danger:hover { background: rgba(251,113,133,0.08); border-color: rgba(251,113,133,0.4); }
.btn-sm { padding: 6px 13px; font-size: 13px; border-radius: 7px; }
.btn-sm svg { width: 13px; height: 13px; }
.btn-icon { padding: 7px; width: 34px; height: 34px; justify-content: center; }
.btn-icon svg { width: 16px; height: 16px; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

/* ─── STAT CARDS ────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--b1);
  border-radius: 12px; padding: 18px 20px;
  position: relative; overflow: hidden;
  transition: border-color var(--tx), transform var(--tx);
  cursor: default;
}
.stat-card:hover { border-color: var(--b2); transform: translateY(-2px); }
.stat-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.stat-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
}
.stat-icon svg { width: 17px; height: 17px; }
.stat-icon.vi { background: rgba(124,111,247,0.12); color: var(--vi); border: 1px solid rgba(124,111,247,0.2); }
.stat-icon.gr { background: rgba(52,211,153,0.12); color: var(--gr); border: 1px solid rgba(52,211,153,0.2); }
.stat-icon.cy { background: rgba(56,189,248,0.12); color: var(--cy); border: 1px solid rgba(56,189,248,0.2); }
.stat-icon.am { background: rgba(251,191,36,0.12); color: var(--am); border: 1px solid rgba(251,191,36,0.2); }
.stat-trend { font-size: 11px; font-weight: 500; }
.stat-trend.up { color: var(--gr); }
.stat-val { font-size: 32px; font-weight: 700; font-family: var(--mono); letter-spacing: -1.5px; line-height: 1; margin-bottom: 4px; }
.stat-val.vi { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-val.gr { color: var(--gr); }
.stat-val.cy { color: var(--cy); }
.stat-val.am { color: var(--am); }
.stat-lbl { font-size: 12px; color: var(--t3); font-weight: 400; }

/* ─── CARDS ─────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--b1);
  border-radius: 12px; padding: 20px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--b1);
}
.card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-title svg { width: 15px; height: 15px; color: var(--t3); }

.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }

/* ─── NODE CARD ─────────────────────────────────────────── */
.node-card {
  background: var(--card);
  border: 1px solid var(--b1);
  border-radius: 12px; padding: 20px;
  cursor: pointer;
  transition: border-color var(--tx), transform var(--tx), box-shadow var(--tx);
  position: relative; overflow: hidden;
}
.node-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: var(--grad); opacity: 0;
  transition: opacity var(--tx);
}
.node-card:hover { border-color: rgba(124,111,247,0.3); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.node-card:hover::after { opacity: 1; }
.node-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.node-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(124,111,247,0.15), rgba(56,189,248,0.08));
  border: 1px solid rgba(124,111,247,0.2);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.node-icon svg { width: 18px; height: 18px; color: var(--vi); }
.node-info { margin-left: 12px; flex: 1; }
.node-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.node-host { font-size: 11px; color: var(--t3); font-family: var(--mono); margin-top: 2px; }
.node-stats { display: flex; gap: 20px; margin-bottom: 16px; }
.node-stat-lbl { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
.node-stat-val { font-size: 24px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.node-actions { display: flex; gap: 7px; flex-wrap: wrap; }

/* ─── TABLE ─────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left; padding: 11px 14px;
  color: var(--t3); font-weight: 500;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px;
  border-bottom: 1px solid var(--b1);
  white-space: nowrap; background: var(--card);
  position: sticky; top: 0; z-index: 1;
}
td {
  padding: 12px 14px; border-bottom: 1px solid var(--b1);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr { transition: background var(--tx); }
tbody tr:hover td { background: rgba(124,111,247,0.04); }

/* ─── BADGES ────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 500;
  font-family: var(--mono); white-space: nowrap;
}
.badge-green { background: rgba(52,211,153,0.1); color: var(--gr); border: 1px solid rgba(52,211,153,0.18); }
.badge-red   { background: rgba(251,113,133,0.1); color: var(--re); border: 1px solid rgba(251,113,133,0.18); }
.badge-amber { background: rgba(251,191,36,0.1); color: var(--am); border: 1px solid rgba(251,191,36,0.18); }
.badge-blue  { background: rgba(56,189,248,0.1);  color: var(--cy); border: 1px solid rgba(56,189,248,0.18); }
.badge-purple{ background: rgba(124,111,247,0.1); color: var(--vi); border: 1px solid rgba(124,111,247,0.18); }
.dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.dot-live { animation: dot-pulse 2.4s ease infinite; }
@keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

/* ─── INPUTS ────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: var(--t2); margin-bottom: 5px; font-weight: 500; }
.form-input {
  width: 100%; padding: 8px 11px;
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 8px; color: var(--t1);
  font-size: 13px; font-family: var(--sans); outline: none;
  transition: border-color var(--tx), box-shadow var(--tx);
}
.form-input:focus {
  border-color: var(--vi);
  box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
}
.form-input::placeholder { color: var(--t3); }
.radio-group { display: flex; gap: 6px; }
.radio-btn {
  flex: 1; padding: 7px; border-radius: 7px; text-align: center;
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--b2); color: var(--t2);
  background: var(--bg3); transition: all var(--tx);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.radio-btn svg { width: 12px; height: 12px; }
.radio-btn.on { background: rgba(124,111,247,0.12); color: var(--t1); border-color: rgba(124,111,247,0.3); }

/* ─── MODAL ─────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 1000; display: flex;
  align-items: center; justify-content: center;
  animation: ov-in .15s ease;
}
@keyframes ov-in { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--bg2);
  border: 1px solid var(--b2);
  border-radius: 16px; padding: 0;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  animation: modal-in .22s var(--ease);
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
@keyframes modal-in { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:none} }
.modal-head {
  padding: 20px 22px 18px;
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-title svg { width: 15px; height: 15px; color: var(--vi); }
.modal-close { cursor: pointer; color: var(--t3); transition: color var(--tx); background: none; border: none; padding: 4px; }
.modal-close:hover { color: var(--t1); }
.modal-close svg { width: 16px; height: 16px; }
.modal-body { padding: 20px 22px; }
.modal-foot { padding: 16px 22px; border-top: 1px solid var(--b1); display: flex; gap: 8px; justify-content: flex-end; }

/* ─── LINK BOX ──────────────────────────────────────────── */
.link-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--b1);
  border-radius: 7px; padding: 6px 10px;
  font-family: var(--mono); font-size: 11px; color: var(--cy);
  cursor: pointer; transition: all var(--tx); max-width: 280px;
}
.link-box:hover { border-color: var(--vi); background: var(--card); }
.link-box svg { width: 11px; height: 11px; flex-shrink: 0; }
.link-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

/* ─── TOAST ─────────────────────────────────────────────── */
.toasts { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--card2); border: 1px solid var(--b2);
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; min-width: 240px; max-width: 340px;
  animation: toast-in .25s var(--ease);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.toast svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
.toast.success { border-left: 3px solid var(--gr); }
.toast.success svg { color: var(--gr); }
.toast.error   { border-left: 3px solid var(--re); }
.toast.error svg { color: var(--re); }
.toast.info    { border-left: 3px solid var(--vi); }
.toast.info svg { color: var(--vi); }
@keyframes toast-in { from{transform:translateX(32px) scale(.95);opacity:0} to{transform:none;opacity:1} }

/* ─── SPINNER ───────────────────────────────────────────── */
.spin {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: var(--cy);
  border-radius: 50%;
  animation: spinning .5s linear infinite;
  display: inline-block; flex-shrink: 0;
}
.spin-sm { width: 12px; height: 12px; }
@keyframes spinning { to{transform:rotate(360deg)} }
.loading-center { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--t2); font-size: 13px; }

/* ─── REFRESHING ────────────────────────────────────────── */
.refreshing { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--t3); }
.refreshing .spin { width: 11px; height: 11px; }

/* ─── EMPTY ─────────────────────────────────────────────── */
.empty { text-align: center; padding: 56px 24px; color: var(--t3); }
.empty-icon { margin-bottom: 16px; display: flex; justify-content: center; }
.empty-icon svg { width: 40px; height: 40px; color: var(--t3); opacity: .4; }
.empty-title { font-size: 14px; font-weight: 500; color: var(--t2); margin-bottom: 6px; }
.empty-desc { font-size: 13px; }

/* ─── TRAFFIC ───────────────────────────────────────────── */
.traf { font-family: var(--mono); font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
.traf .rx { color: var(--gr); }
.traf .tx { color: var(--re); }

/* ─── ACTIONS ROW ───────────────────────────────────────── */
.acts { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

/* ─── PAGE ENTER ────────────────────────────────────────── */
.pg { animation: pg-in .22s var(--ease); }
@keyframes pg-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ─── SECTION LABEL ─────────────────────────────────────── */
.sec-lbl {
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: 1.2px;
  margin: 22px 0 14px;
  display: flex; align-items: center; gap: 10px;
}

/* ─── DIVIDER ───────────────────────────────────────────── */

/* ─── LOGIN ─────────────────────────────────────────────── */
.login-wrap {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
  padding: 20px;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(124,111,247,0.1) 0%, transparent 70%),

.login-card {
  width: 100%; max-width: 400px;
  background: var(--bg2);
  border: 1px solid var(--b2);

.mobile-bar {

.mob-item svg { width: 20px; height: 20px; }
.mob-label { font-size: 10px; font-weight: 500; }

/* ── Auth ───────────────────────────────────────────────── */
const getToken = () => localStorage.getItem('mtg_token') || '';
const setToken = (t) => localStorage.setItem('mtg_token', t);
const getTotpCode = () => sessionStorage.getItem('mtg_totp') || '';
const setTotpCode = (c) => { if(c) sessionStorage.setItem('mtg_totp',c); else sessionStorage.removeItem('mtg_totp'); };

/* ── API with GET dedup ─────────────────────────────────── */
const _pend = {};
const api = async (method, path, body) => {
  const key = `${method}:${path}`;
  if (method==='GET' && _pend[key]) return _pend[key];
  const headers = { 'Content-Type':'application/json', 'x-auth-token': getToken() };
  const totp = getTotpCode(); if(totp) headers['x-totp-code'] = totp;
  const req = fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined })
    .then(async r => {
      delete _pend[key];
      if(r.status===401){ setToken(''); throw new Error('Unauthorized'); }
      if(r.status===403){ const d=await r.json().catch(()=>({})); if(d.totp) throw new Error('TOTP_REQUIRED'); throw new Error(d.error||'Forbidden'); }
      const data = await r.json();
      if(!r.ok) throw new Error(data.error||'API error');
      return data;
    }).catch(e=>{ delete _pend[key]; throw e; });
  if(method==='GET') _pend[key]=req;
  return req;
};

/* ── Toast ──────────────────────────────────────────────── */
let _toast = null;
function useToast() {
  const [toasts, setToasts] = useState([]);
  _toast = (msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id!==id)), 3500);
  };
  return toasts;
}
const toast = (msg, type) => _toast && _toast(msg, type);
const copyText = (txt) => navigator.clipboard.writeText(txt).then(() => toast('Скопировано!', 'success'));

function Toasts({ list }) {
  const icon = { success: <I.Check/>, error: <I.AlertCircle/>, info: <I.Info/> };
  return <div className="toasts">{list.map(t => <div key={t.id} className={`toast ${t.type}`}>{icon[t.type]}<span>{t.msg}</span></div>)}</div>;
}

/* ── Login ──────────────────────────────────────────────── */
function Login({ onLogin }) {
  const [tok, setTok] = useState('');
  const [step, setStep] = useState('token');
  const [totp, setTotp] = useState('');
  const [loading, setLoading] = useState(false);

  const submitToken = async e => {
    e.preventDefault(); if(!tok.trim()) return;
    setLoading(true);
    try {
      setToken(tok);
      const s = await fetch('/api/totp/status', { headers:{'x-auth-token':tok} }).then(r=>r.json());
      if(s.enabled) { setStep('totp'); }
      else { await api('GET','/api/nodes'); toast('Вход выполнен','success'); onLogin(tok); }
    } catch { setToken(''); toast('Неверный токен','error'); }
    finally { setLoading(false); }
  };

  const submitTotp = async e => {
    e.preventDefault(); if(totp.length!==6) return;
    setLoading(true);
    try { setTotpCode(totp); await api('GET','/api/nodes'); toast('Вход выполнен','success'); onLogin(tok); }
    catch { setTotpCode(''); setTotp(''); toast('Неверный код 2FA','error'); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-head">
          <div className="login-icon">{step==='totp'?<I.Shield/>:<I.Zap/>}</div>
          <div className="login-title">MTG Panel</div>
          <div className="login-sub">{step==='totp'?'two-factor auth':'mtg proxy manager'}</div>
        </div>
        <div className="login-body">
          {step==='token' ? (
            <form onSubmit={submitToken}>
              <div className="form-group">
                <label className="form-label">Auth Token</label>
                <input className="form-input" type="password" placeholder="Введи токен доступа..." value={tok}
                  onChange={e=>setTok(e.target.value)} autoFocus />
              </div>
              <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:10}} type="submit" disabled={loading}>
                {loading ? <span className="spin spin-sm"/> : <><I.Zap/> Войти</>}
              </button>
            </form>
          ) : (
            <form onSubmit={submitTotp}>
              <p style={{fontSize:13,color:'var(--t2)',textAlign:'center',marginBottom:18,lineHeight:1.6}}>
                Открой Google Authenticator и введи<br/>текущий 6-значный код
              </p>
              <div className="form-group">
                <input className="form-input totp-code-input" type="text" inputMode="numeric"
                  placeholder="——————" value={totp} maxLength={6}
                  onChange={e=>setTotp(e.target.value.replace(/\D/g,''))} autoFocus />
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} type="button"
                  onClick={()=>{setStep('token');setToken('');setTotp('');}}>
                  <I.ArrowLeft/> Назад
                </button>
                <button className="btn btn-primary" style={{flex:1.5,justifyContent:'center'}} type="submit"
                  disabled={loading||totp.length!==6}>
                  {loading?<span className="spin spin-sm"/>:<><I.Check/> Подтвердить</>}
                </button>
              </div>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Shared UI components ───────────────────────────────── */
function expiryBadge(expires_at, small) {
  if(!expires_at) return <span style={{color:'var(--t3)',fontSize:small?11:12}}>∞</span>;
  const d = Math.floor((new Date(expires_at) - new Date()) / 86400000);
  if(d < 0) return <span className="badge badge-red">истёк</span>;
  return <span style={{fontFamily:'var(--mono)',fontSize:small?11:12,color:d<3?'var(--am)':'var(--t2)'}}>{d}д</span>;
}
function StatPill({count, label, color, dot, large}) {
  const sz = large ? {num:26, lbl:11, pad:'12px 18px', r:12} : {num:14, lbl:11, pad:'5px 11px', r:8};
  return (
    <div style={{display:'flex', flexDirection: large?'column':'row', alignItems:'center', gap: large?4:5,
      background:`rgba(${color},0.1)`, borderRadius:sz.r, padding:sz.pad,
      whiteSpace:'nowrap', flex: large?1:undefined, minWidth: large?80:undefined}}>
      {large ? (
        <>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            {dot && <span className={`dot ${dot}`}/>}
            <span style={{fontSize:sz.num,fontWeight:800,letterSpacing:'-1px',color:`rgb(${color})`}}>{count}</span>
          </div>
          <span style={{fontSize:sz.lbl,color:'var(--t3)',fontWeight:500}}>{label}</span>
        </>
      ) : (
        <>
          {dot && <span className={`dot ${dot}`}/>}
          <span style={{fontSize:sz.num,fontWeight:700,color:`rgb(${color})`}}>{count}</span>
          <span style={{fontSize:sz.lbl,color:'var(--t3)'}}>{label}</span>
        </>
      )}
    </div>
  );
}

function FlagPicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const current = COUNTRIES.find(c => c.code === value);
  return (
    <div style={{position:'relative'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 11px',background:'var(--bg3)',border:'1px solid var(--b2)',borderRadius:9,cursor:'pointer',transition:'border-color var(--tx)'}}

// Parse "mtg:2 | built 2026-02-28T14:06:37.762665Z" → { name:"mtg:2", date:"28 Feb 2026" }
function parseVer(raw) {
  if(!raw || raw === 'error' || raw === 'unknown') return { name: raw || '—', date: null };
  const m = raw.match(/^([\w:.]+)\s*\|\s*built\s+([\d-T:.Z]+)/);
  if(m) {
    const d = new Date(m[2]);
    const date = isNaN(d) ? null : d.toLocaleDateString('ru-RU', {day:'2-digit',month:'short',year:'numeric'});
    return { name: m[1], date };
  }
  return { name: raw.slice(0,20), date: null };
}

function SshKeyManager({ sshKey, setSshKey }) {
  const [keys, setKeys] = useState([]);
  const [uploading, setUploading] = useState(false);
  const fileInput = React.useRef();

  useEffect(() => {
    api('GET', '/api/ssh_keys').then(setKeys).catch(() => setKeys([]));
  }, []);

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    const formData = new FormData();
    formData.append('key', file);
    try {
      const res = await fetch('/api/ssh_keys', {
        method: 'POST',
        headers: { 'x-auth-token': getToken() },
        body: formData,
      }).then(r => r.json());
      if (res.error) throw new Error(res.error);
      setKeys([...keys, res.name]);
      setSshKey(res.name);
    } catch (e) {
      toast.error(e.message);
    }
    setUploading(false);
  };

  return (
    <div className="form-group">
      <label className="form-label">SSH-ключ</label>
      <div style={{ display: 'flex', gap: 8 }}>
        <select className="form-input" value={sshKey || ''} onChange={e => setSshKey(e.target.value)} style={{ flex: 1 }}>
          <option value="">Выберите ключ...</option>
          {keys.map(k => <option key={k} value={k}>{k}</option>)}
        </select>
        <button className="btn" onClick={() => fileInput.current.click()} disabled={uploading}>
          {uploading ? 'Загрузка...' : <I.Upload />}
        </button>
        <input type="file" ref={fileInput} onChange={handleUpload} style={{ display: 'none' }} />
      </div>
    </div>
  );
}

/* ── Nodes List Page ─────────────────────────────────────── */
function NodesPage({ nodes, onReload, onManage, onOpenNode }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [status, setStatus] = useState([]);

  const loadStatus = useCallback(async () => {
    try { const s = await api('GET','/api/status'); setStatus(s); } catch {}
  }, []);

  useEffect(() => {
    loadStatus();
    const t = setInterval(loadStatus, 20000);
    return () => clearInterval(t);
  }, []);

  const del = async (node) => {
    if(!confirm(`Удалить ноду ${node.name}?`)) return;
    try { await api('DELETE',`/api/nodes/${node.id}`); toast('Нода удалена','success'); onReload(); }
    catch(e) { toast(e.message,'error'); }
  };

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title"><em>Ноды</em></div>
          <div className="page-desc">{nodes.length} серверов настроено</div>
        </div>
        <div className="topbar-right">
          <button className="btn btn-primary" onClick={()=>{setEdit(null);setModal(true);}}>
            <I.Plus/> Добавить ноду
          </button>
        </div>
      </div>

      {!nodes.length
        ? <div className="card"><div className="empty"><div className="empty-icon"><I.Server/></div><div className="empty-title">Нет нод</div><div className="empty-desc">Добавь первую ноду</div></div></div>
        : (
          <div className="grid-2">
            {nodes.map(node => {
              const s = status.find(x=>x.id===node.id)||{};
              const total   = node._userCount||0;
              const active  = s.containers||0;
              const stopped = total - active;
              return (
                <div className="card" key={node.id} style={{padding:0,overflow:'hidden',cursor:'pointer'}}
                  onClick={()=>onOpenNode(node)}>
                  <div style={{padding:'18px 20px 14px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:5}}>
                        {node.flag && <img src={flagUrl(node.flag,'w80')} alt={node.flag} style={{width:32,height:24,objectFit:'cover',borderRadius:3,boxShadow:'0 1px 4px rgba(0,0,0,.3)',flexShrink:0}}/>}
                        <span style={{fontSize:17,fontWeight:700,letterSpacing:'-0.3px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{node.name}</span>
                        {node.agent_port && <span className="badge badge-purple" style={{fontSize:10,padding:'2px 6px'}}>Agent</span>}
                      </div>
                      <div style={{fontSize:12,color:'var(--t3)',fontFamily:'var(--mono)'}}>{node.host}</div>
                    </div>
                    <span className={`badge ${s.online?'badge-green':'badge-red'}`} style={{flexShrink:0}}>
                      <span className={`dot ${s.online?'dot-live':''}`}/>{s.online?'онлайн':'офлайн'}
                    </span>
                  </div>
                  <div style={{padding:'11px 20px',display:'flex',gap:8,flexWrap:'wrap',borderBottom:'1px solid var(--b1)'}}>
                    <StatPill count={total}  label="всего"      color="124,111,247" dot={null}/>
                    <StatPill count={active} label="активных"   color="34,197,94"  dot="dot-live"/>
                    {s.online_users > 0 && <StatPill count={s.online_users} label="онлайн" color="56,189,248" dot="dot-live"/>}
                    {stopped > 0 && <StatPill count={stopped} label="остановлен" color="251,113,133" dot=""/>}
                  </div>
                  <div style={{padding:'11px 20px',display:'flex',gap:8,alignItems:'center'}}>
                    <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}}
                      onClick={e=>{e.stopPropagation();onManage(node);}}>
                      <I.Users/> Клиенты
                    </button>
                    <button className="btn btn-secondary btn-sm" onClick={e=>{e.stopPropagation();setEdit(node);setModal(true);}}>
                      <I.Edit/>
                    </button>
                    <button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();del(node);}}>
                      <I.Trash/>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )
      }
      {modal && <NodeModal node={edit} onClose={()=>setModal(false)} onSave={()=>{setModal(false);onReload();}}/>}
    </div>
  );
}

/* ── Node Detail Page ────────────────────────────────────── */
function NodePage({ node, onBack, onManage, onReload }) {
  const [status, setStatus] = useState(null);
  const [users, setUsers] = useState([]);
  const [traffic, setTraffic] = useState({});
  const [loading, setLoading] = useState(true);
  const [modalEdit, setModalEdit] = useState(false);

  const loadData = useCallback(async () => {
    try {
      const [st, u, tr] = await Promise.allSettled([
        api('GET', `/api/nodes/${node.id}/check`),
        api('GET', `/api/nodes/${node.id}/users`),
        api('GET', `/api/nodes/${node.id}/traffic`),
      ]);
      if(st.status==='fulfilled') setStatus(st.value);
      if(u.status==='fulfilled')  setUsers(u.value||[]);
      if(tr.status==='fulfilled') setTraffic(tr.value||{});
    } catch {} finally { setLoading(false); }
  }, [node.id]);

  useEffect(() => {
    loadData();
    const t = setInterval(loadData, 20000);
    return () => clearInterval(t);
  }, [loadData]);

  const isOnline = status ? status.online : null;

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left" style={{display:'flex',alignItems:'center',gap:14}}>

              <div className="page-title" style={{marginBottom:0}}><em>{node.name}</em></div>

          <button className="btn btn-secondary btn-sm" onClick={()=>setModalEdit(true)}><I.Edit/> Настройки</button>
          <button className="btn btn-primary btn-sm" onClick={()=>onManage(node)}><I.Users/> Клиенты</button>
        </div>
      </div>

      {/* Status + SSH info */}
      <div className="card" style={{marginBottom:16,padding:'18px 20px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:11,color:'var(--t3)',marginBottom:4}}>SSH</div>

            </div>
            <div>
              <div style={{fontSize:11,color:'var(--t3)',marginBottom:4}}>Начальный порт</div>
              <div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--t2)'}}>{node.start_port}</div>
            </div>
            {node.agent_port && (
              <div>
                <div style={{fontSize:11,color:'var(--t3)',marginBottom:4}}>Агент</div>
                <div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--vi)'}}>:{node.agent_port}</div>

                {!users.length && <tr><td colSpan={8}><div className="empty"><div className="empty-icon"><I.Users/></div><div className="empty-title">Нет клиентов</div></div></td></tr>}

        )}
      </div>

      {modalEdit && <NodeModal node={node} onClose={()=>setModalEdit(false)} onSave={()=>{setModalEdit(false);onReload();}}/>}
    </div>
  );
}

/* ── Add User Modal ─────────────────────────────────────── */
function AddUserModal({ nodeId, onClose, onSave }) {
  const [f, setF] = useState({name:'',note:'',expires_at:'',traffic_limit_gb:''});
  const [loading, setLoading] = useState(false);
  const set = (k,v) => setF(x=>({...x,[k]:v}));

  const submit = async () => {
    if(!f.name.trim()){toast('Введи имя','error');return;}
    if(f.name.length > 32){toast('Имя не может быть длиннее 32 символов','error');return;}
    setLoading(true);
    try {
      const u = await api('POST',`/api/nodes/${nodeId}/users`,{
        name:f.name.trim(), note:f.note||'',
        expires_at:f.expires_at||null,
        traffic_limit_gb:f.traffic_limit_gb?parseFloat(f.traffic_limit_gb):null
      });
      toast(`Юзер ${u.name} создан`,'success'); onSave(u);
    } catch(e){toast(e.message,'error');}
    finally{setLoading(false);}
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-head">
          <div className="modal-title"><I.Plus/> Добавить юзера</div>
          <button className="modal-close" onClick={onClose}><I.X/></button>
        </div>
        <div className="modal-body">
          <div className="form-group"><label className="form-label">Имя * (латиница)</label>
            <input className="form-input" placeholder="ivan" value={f.name}
              onChange={e=>set('name',e.target.value.toLowerCase().replace(/[^a-z0-9_-]/g,''))}
              onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
          </div>
          <div className="form-group"><label className="form-label">Заметка</label>
            <input className="form-input" placeholder="Иван, оплатил до 01.04" value={f.note} onChange={e=>set('note',e.target.value)}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group"><label className="form-label">Истекает</label>
              <input className="form-input" type="datetime-local" value={f.expires_at} onChange={e=>set('expires_at',e.target.value)}/>
            </div>
            <div className="form-group"><label className="form-label">Лимит трафика (ГБ)</label>
              <input className="form-input" type="number" placeholder="∞" min="0" step="0.1" value={f.traffic_limit_gb} onChange={e=>set('traffic_limit_gb',e.target.value)}/>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading?<span className="spin spin-sm"/>:<><I.Check/> Создать</>}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Edit User Modal ────────────────────────────────────── */
function EditModal({ user, nodeId, onClose, onSave }) {
  const [f, setF] = useState({
    note: user.note||'',
    expires_at: user.expires_at ? user.expires_at.replace(' ','T').slice(0,16) : '',
    traffic_limit_gb: user.traffic_limit_gb||'',
    max_devices: user.max_devices||'',
    traffic_reset_interval: user.traffic_reset_interval||'never',
  });
  const [loading, setLoading] = useState(false);
  const set = (k,v) => setF(x=>({...x,[k]:v}));

  const submit = async () => {
    setLoading(true);
    try {
      await api('PUT', `/api/nodes/${nodeId}/users/${user.name}`, {
        note: f.note,
        expires_at: f.expires_at||null,
        traffic_limit_gb: f.traffic_limit_gb ? parseFloat(f.traffic_limit_gb) : null,
        max_devices: f.max_devices ? parseInt(f.max_devices) : null,
        traffic_reset_interval: f.traffic_reset_interval !== 'never' ? f.traffic_reset_interval : null,
      });
      toast('Сохранено','success'); onSave();
    } catch(e){toast(e.message,'error');}
    finally{setLoading(false);}
  };

  const fmtBytes = (b) => {
    if(!b) return '0';
    if(b >= 1073741824) return (b/1073741824).toFixed(2)+'GB';
    if(b >= 1048576) return (b/1048576).toFixed(2)+'MB';
    if(b >= 1024) return (b/1024).toFixed(2)+'KB';
    return b+'B';
  };
  const totalRx = fmtBytes(user.total_traffic_rx_bytes);
  const totalTx = fmtBytes(user.total_traffic_tx_bytes);

  const INTERVALS = [
    {v:'never', label:'Не сбрасывать'},
    {v:'daily',   label:'Каждый день'},
    {v:'monthly', label:'Каждый месяц'},
    {v:'yearly',  label:'Каждый год'},
  ];

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:460}}>
        <div className="modal-head">
          <div className="modal-title"><I.Edit/> Настройки — {user.name}</div>
          <button className="modal-close" onClick={onClose}><I.X/></button>
        </div>
        <div className="modal-body">

          {/* Basic */}
          <div className="form-group">
            <label className="form-label">Заметка</label>
            <input className="form-input" placeholder="Иван, оплатил до 01.04" value={f.note} onChange={e=>set('note',e.target.value)} autoFocus/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group">
              <label className="form-label">Истекает</label>
              <input className="form-input" type="datetime-local" value={f.expires_at} onChange={e=>set('expires_at',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Лимит трафика (ГБ)</label>
              <input className="form-input" type="number" placeholder="∞" min="0" step="0.1" value={f.traffic_limit_gb} onChange={e=>set('traffic_limit_gb',e.target.value)}/>
            </div>
          </div>

          {/* Device limit */}
          <div style={{borderTop:'1px solid var(--b1)',paddingTop:14,marginTop:4}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><I.Wifi/></span>
              Ограничения устройств
            </div>
            <div className="form-group">
              <label className="form-label">Макс. одновременных устройств</label>
              <input className="form-input" type="number" placeholder="∞ (без ограничений)"
                min="1" step="1" value={f.max_devices}
                onChange={e=>set('max_devices',e.target.value)}/>
              <div style={{fontSize:11,color:'var(--t3)',marginTop:5}}>
                При превышении прокси автоматически остановится
              </div>
            </div>
          </div>

          {/* Auto traffic reset */}
          <div style={{borderTop:'1px solid var(--b1)',paddingTop:14,marginTop:4}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><I.RefreshCw/></span>
              Автосброс трафика
            </div>
            <div className="form-group">
              <label className="form-label">Интервал сброса</label>
              <div className="radio-group" style={{flexWrap:'wrap'}}>
                {INTERVALS.map(i => (
                  <div key={i.v} className={`radio-btn ${f.traffic_reset_interval===i.v?'on':''}`}
                    onClick={()=>set('traffic_reset_interval',i.v)}>
                    {i.label}
                  </div>
                ))}
              </div>
            </div>
            {user.next_reset_at && (
              <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>
                Следующий сброс: <span style={{color:'var(--t2)'}}>{new Date(user.next_reset_at).toLocaleString('ru-RU')}</span>
              </div>
            )}
          </div>

          {/* Total traffic stats */}
          {(user.total_traffic_rx_bytes > 0 || user.total_traffic_tx_bytes > 0) && (
            <div style={{borderTop:'1px solid var(--b1)',paddingTop:14,marginTop:4}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><I.Activity/></span>
                Накопленный трафик
              </div>
              <div style={{display:'flex',gap:16}}>
                <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 14px',flex:1,textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--t3)',marginBottom:3}}>Получено</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--cy)'}}>{totalRx}</div>
                </div>
                <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 14px',flex:1,textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--t3)',marginBottom:3}}>Отправлено</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--gr)'}}>{totalTx}</div>
                </div>
              </div>
            </div>
          )}

        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading?<span className="spin spin-sm"/>:<><I.Check/> Сохранить</>}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Chart ──────────────────────────────────────────────── */
/* ── Users Page ─────────────────────────────────────────── */
function UsersPage({ node, onBack }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [ref, setRef] = useState(false);
  const [modal, setModal] = useState(false);
  const [busy, setBusy] = useState({});
  const [editU, setEditU] = useState(null);
  const [qrU, setQrU] = useState(null);
  const [traffic, setTraffic] = useState({});

  const loadUsers = useCallback(async (silent=false) => {
    if(silent) setRef(true); else setLoading(true);
    try { const u = await api('GET',`/api/nodes/${node.id}/users`); setUsers(u); }
    finally { setLoading(false); setRef(false); }
  }, [node.id]);

  const loadTraffic = useCallback(async () => {
    try { const t = await api('GET',`/api/nodes/${node.id}/traffic`); setTraffic(t||{}); } catch {}
  }, [node.id]);

  const syncUsers = async () => {
    try {
      const r = await api('POST',`/api/nodes/${node.id}/sync`);
      toast(`Синхронизировано: ${r.imported} новых из ${r.total}`, r.imported>0?'success':'info');
      loadUsers(true);
    } catch(e){toast(e.message,'error');}
  };

  useEffect(()=>{ loadUsers(); loadTraffic(); },[loadUsers,loadTraffic]);
  useEffect(()=>{ const t=setInterval(()=>loadTraffic(),30000); return()=>clearInterval(t); },[loadTraffic]);

  const setBusyFor = (n,v) => setBusy(b=>({...b,[n]:v}));

  const remove = async (user) => {
    if(!confirm(`Удалить ${user.name}?`)) return;
    setBusyFor(user.name,true);
    try { await api('DELETE',`/api/nodes/${node.id}/users/${user.name}`); toast(`${user.name} удалён`,'success'); loadUsers(true); }
    catch(e){toast(e.message,'error');}
    finally{setBusyFor(user.name,false);}
  };

  const toggle = async (user) => {
    const action = user.running ? 'stop' : 'start';
    if (action === 'start' && user.expired) {
      if (!confirm(`Срок действия клиента ${user.name} истёк.\nОн будет автоматически остановлен заново.\nЧтобы продлить — обнови дату в настройках клиента.\n\nВсё равно запустить?`)) return;
    }
    setUsers(p=>p.map(u=>u.name===user.name?{...u,running:!user.running}:u));
    setBusyFor(user.name,true);
    try { await api('POST',`/api/nodes/${node.id}/users/${user.name}/${action}`); toast(`${user.name}: ${action==='stop'?'остановлен':'запущен'}`,'success'); }
    catch(e){ setUsers(p=>p.map(u=>u.name===user.name?{...u,running:user.running}:u)); toast(e.message,'error'); }
    finally{setBusyFor(user.name,false);}
  };

  const resetTraffic = async (user) => {
    if(!confirm(`Сбросить трафик ${user.name}? Прокси будет перезапущен.`)) return;
    setBusyFor(user.name+'_reset', true);
    try {
      await api('POST', `/api/nodes/${node.id}/users/${user.name}/reset-traffic`);
      toast(`${user.name}: трафик сброшен`, 'success');
      loadUsers(true);
      setTimeout(()=>loadTraffic(), 1500);
    } catch(e){toast(e.message,'error');}
    finally{setBusyFor(user.name+'_reset', false);}
  };

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left" style={{display:'flex',alignItems:'center',gap:14}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}><I.ArrowLeft/> Назад</button>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {node.flag && <img src={flagUrl(node.flag,'w80')} alt={node.flag} style={{width:30,height:22,objectFit:'cover',borderRadius:3,boxShadow:'0 1px 4px rgba(0,0,0,.3)',flexShrink:0}}/>}
            <div>
              <div className="page-title" style={{marginBottom:0}}><em>{node.name}</em></div>
              <div className="page-desc" style={{marginTop:0}}>{node.host}</div>
            </div>
          </div>
        </div>
        <div className="topbar-right">
          {ref && <span className="refreshing"><span className="spin"/> обновление</span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>loadUsers(true)}><I.RefreshCw/></button>
          <button className="btn btn-secondary btn-sm" onClick={syncUsers}><I.Sync/> Синхр.</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setModal(true)}><I.Plus/> Добавить</button>
        </div>
      </div>

      <div className="card">
        {loading ? <div className="loading-center"><span className="spin"/> Загружаю юзеров...</div> : (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Клиент</th>
                <th>Порт</th>
                <th>Онлайн</th>
                <th>Устройств</th>
                <th>Трафик</th>
                <th>Статус</th>
                <th>Срок / Лимит</th>
                <th>Заметка</th>
                <th>Действия</th>
              </tr></thead>
              <tbody>
                {users.map(u => {
                  const traf = u.running
                    ? traffic[u.name]
                    : (u.traffic_rx_snap ? {rx:u.traffic_rx_snap, tx:u.traffic_tx_snap} : traffic[u.name]);
                  const devLimit = u.max_devices;
                  const devOver = devLimit && u.connections > devLimit;
                  return (
                  <tr key={u.id}>
                    <td><span style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:14}}>{u.name}</span></td>
                    <td><span className="badge badge-purple">{u.port}</span></td>
                    <td>
                      {u.is_online
                        ? <span className="badge badge-green"><span className="dot dot-live"/>online</span>
                        : <span style={{color:'var(--t3)',fontSize:12}}>—</span>}
                    </td>
                    <td>
                      <span style={{fontFamily:'var(--mono)',fontWeight:500,fontSize:14,
                        color: devOver ? 'var(--re)' : u.connections > 0 ? 'var(--vi)' : 'var(--t3)'}}
                        title={devLimit ? `Лимит: ${devLimit} устройств` : 'Без ограничений'}>
                        {u.connections}{devLimit ? `/${devLimit}` : ''}
                      </span>
                    </td>
                    <td>
                      {traf
                        ? <span className="traf">
                            <span className="rx">↓{traf.rx}</span>
                            <span className="tx"> ↑{traf.tx}</span>
                            {!u.running && u.traffic_rx_snap && <span style={{fontSize:10,color:'var(--t3)',marginLeft:4}} title="Снапшот на момент паузы">⏸</span>}
                          </span>
                        : <span style={{color:'var(--t3)',fontSize:12}}>—</span>}
                    </td>
                    <td>
                      <div style={{display:'flex',flexDirection:'column',gap:3,alignItems:'flex-start'}}>
                        <span className={`badge ${u.running?'badge-green':'badge-red'}`}>
                          <span className={`dot ${u.running?'dot-live':''}`}/>
                          {u.running?'active':'stopped'}
                        </span>
                        {u.expired && <span className="badge badge-amber">истёк</span>}
                      </div>
                    </td>
                    <td>
                      <div style={{display:'flex',flexDirection:'column',gap:3}}>
                        {u.expires_at && <div>{expiryBadge(u.expires_at)}</div>}
                        {u.traffic_limit_gb && <span style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mono)'}}>{u.traffic_limit_gb}GB</span>}
                        {!u.expires_at && !u.traffic_limit_gb && <span style={{color:'var(--t3)',fontSize:12}}>∞</span>}
                        {u.traffic_reset_interval && u.traffic_reset_interval !== 'never' && (
                          <span style={{fontSize:10,color:'var(--vi)'}} title={u.next_reset_at ? `Следующий: ${new Date(u.next_reset_at).toLocaleString('ru-RU')}` : ''}>
                            ↺ {u.traffic_reset_interval === 'daily' ? 'день' : u.traffic_reset_interval === 'monthly' ? 'мес' : 'год'}
                          </span>
                        )}
                      </div>
                    </td>
                    <td style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13,color:'var(--t2)'}} title={u.note}>
                      {u.note || <span style={{color:'var(--t3)'}}>—</span>}
                    </td>
                    <td>
                      <div className="acts">
                        <button className={`btn btn-icon btn-sm ${u.running?'btn-ghost':'btn-primary'}`}
                          onClick={()=>toggle(u)} disabled={busy[u.name]} title={u.running?'Остановить':'Запустить'}>
                          {busy[u.name]?<span className="spin spin-sm"/>:(u.running?<I.Pause/>:<I.Play/>)}
                        </button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>copyText(u.link)} title="Копировать ссылку"><I.Copy/></button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>setQrU(u)} title="QR-код"><I.QrCode/></button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>setEditU(u)} title="Редактировать"><I.Edit/></button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>resetTraffic(u)}
                          disabled={busy[u.name+'_reset']} title="Сбросить трафик (перезапуск прокси)">
                          {busy[u.name+'_reset']?<span className="spin spin-sm"/>:<I.RefreshCw/>}
                        </button>
                        <button className="btn btn-icon btn-danger btn-sm" onClick={()=>remove(u)} disabled={busy[u.name]} title="Удалить"><I.Trash/></button>
                      </div>
                    </td>
                  </tr>
                  );
                })}
                {!users.length && <tr><td colSpan={9}><div className="empty"><div className="empty-icon"><I.Users/></div><div className="empty-title">Нет клиентов</div><div className="empty-desc">Добавь первого клиента</div></div></td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && <AddUserModal nodeId={node.id} onClose={()=>setModal(false)} onSave={()=>{setModal(false);loadUsers(true);}}/>}
      {qrU && <QRModal user={qrU} onClose={()=>setQrU(null)}/>}
      {editU && <EditModal user={editU} nodeId={node.id} onClose={()=>setEditU(null)} onSave={()=>{setEditU(null);loadUsers(true);}}/>}
    </div>
  );
}

/* ── All Clients (grouped by node) ─────────────────────── */
function AllUsers({ nodes, onSelectNode }) {
  const [groups, setGroups] = useState({}); // { nodeId: users[] }
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);

  const load = useCallback(async (silent=false) => {
    if(silent) setRefreshing(true); else setLoading(true);
    try {
      const res = await Promise.all(nodes.map(async n => {
        try {
          const [users, traffic] = await Promise.all([
            api('GET', `/api/nodes/${n.id}/users`),
            api('GET', `/api/nodes/${n.id}/traffic`).catch(() => ({}))
          ]);
          // Merge traffic into each user
          return [n.id, users.map(u => ({...u, traffic: traffic[u.name] || null}))];
        } catch { return [n.id, []]; }
      }));
      setGroups(Object.fromEntries(res));
    } finally { setLoading(false); setRefreshing(false); }
  }, [nodes]);

  useEffect(() => { load(); }, [load]);

  const totalUsers = Object.values(groups).reduce((a, u) => a + u.length, 0);
  const totalActive = Object.values(groups).reduce((a, u) => a + u.filter(x => x.running).length, 0);

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title">Все <em>клиенты</em></div>
          <div className="page-desc">
            {loading ? '...' : `${totalUsers} клиентов · ${totalActive} активных · ${nodes.length} нод`}
          </div>
        </div>
        <div className="topbar-right">
          {refreshing && <span className="refreshing"><span className="spin"/></span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>load(true)}><I.RefreshCw/> Обновить</button>
        </div>
      </div>

      {loading ? <div className="loading-center"><span className="spin"/> Загружаю...</div> : (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {nodes.map(node => {
            const users = groups[node.id] || [];
            const active = users.filter(u => u.running).length;
            return (
              <div className="card" key={node.id}>
                {/* Node header */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom: users.length ? 16 : 0}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div className="node-icon" style={{width:34,height:34,borderRadius:9}}><I.Server/></div>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{node.name}</div>
                      <div style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mono)'}}>{node.host}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {users.length > 0 && (
                      <div style={{display:'flex',gap:6}}>
                        <span className="badge badge-green">{active} active</span>
                        <span className="badge badge-purple">{users.length} total</span>
                      </div>
                    )}
                    <button className="btn btn-primary btn-sm" onClick={()=>onSelectNode(node)}>
                      <I.Users/> Управление
                    </button>
                  </div>
                </div>

                {users.length > 0 && (
                  <div className="table-wrap">
                    <table>
                      <thead><tr>
                        <th>Клиент</th>
                        <th>Порт</th>
                        <th>Подкл.</th>
                        <th>Трафик</th>
                        <th>Статус</th>
                        <th>Срок</th>
                        <th>Заметка</th>
                        <th></th>
                      </tr></thead>
                      <tbody>
                        {users.map(u => (
                          <tr key={u.id} style={{opacity: u.expired ? 0.5 : 1}}>
                            <td><span style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:13}}>{u.name}</span></td>
                            <td><span className="badge badge-purple">{u.port}</span></td>
                            <td><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--vi)'}}>{u.connections}</span></td>
                            <td>
                              {u.traffic
                                ? <span className="traf"><span className="rx">↓{u.traffic.rx}</span><span className="tx"> ↑{u.traffic.tx}</span></span>
                                : <span style={{color:'var(--t3)',fontSize:11}}>—</span>}
                            </td>
                            <td>
                              <span className={`badge ${u.running?'badge-green':'badge-red'}`}>
                                <span className={`dot ${u.running?'dot-live':''}`}/>{u.running?'active':'stopped'}
                              </span>
                            </td>
                            <td>{expiryBadge(u.expires_at, true)}</td>
                            <td style={{maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:'var(--t2)'}} title={u.note}>
                              {u.note || <span style={{color:'var(--t3)'}}>—</span>}
                            </td>
                            <td>
                              <div className="acts">
                                <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>copyText(u.link)} title="Копировать ссылку"><I.Copy/></button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}

                {users.length === 0 && (
                  <div style={{color:'var(--t3)',fontSize:12,textAlign:'center',padding:'12px 0'}}>
                    Нет клиентов на этой ноде
                  </div>
                )}
              </div>
            );
          })}
          {!nodes.length && (
            <div className="empty"><div className="empty-icon"><I.Users/></div><div className="empty-title">Нет нод</div></div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Settings ───────────────────────────────────────────── */
function Settings() {
  const [enabled, setEnabled] = useState(false);
  const [data, setData] = useState(null);
  const [verify, setVerify] = useState('');
  const [disable, setDisable] = useState('');
  const [loading, setLoading] = useState(false);
  const [step, setStep] = useState('idle');

  useEffect(()=>{ api('GET','/api/totp/status').then(r=>setEnabled(r.enabled)).catch(()=>{}); },[]);

  const startSetup = async () => {
    setLoading(true);
    try { const d=await api('POST','/api/totp/setup'); setData(d); setStep('setup'); }
    catch(e){toast(e.message,'error');} finally{setLoading(false);}
  };

  const confirmEnable = async () => {
    if(verify.length!==6) return;
    setLoading(true);
    try { await api('POST','/api/totp/verify',{code:verify}); toast('2FA включена!','success'); setEnabled(true); setStep('idle'); setData(null); setVerify(''); }
    catch { toast('Неверный код','error'); } finally{setLoading(false);}
  };

  const confirmDisable = async () => {
    if(disable.length!==6) return;
    setLoading(true);
    try { await api('POST','/api/totp/disable',{code:disable}); toast('2FA отключена','success'); setEnabled(false); setStep('idle'); setDisable(''); setTotpCode(''); }
    catch { toast('Неверный код','error'); } finally{setLoading(false);}
  };

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title"><em>Настройки</em></div>
        </div>
      </div>

      <div className="card" style={{maxWidth:520}}>
        <div className="card-header">
          <div className="card-title"><I.Shield/> Двухфакторная аутентификация</div>
          <span className={`badge ${enabled?'badge-green':'badge-red'}`}>
            <span className={`dot ${enabled?'dot-live':''}`}/>{enabled?'включена':'выключена'}
          </span>
        </div>

        <p style={{fontSize:13,color:'var(--t3)',marginBottom:18}}>
          Google Authenticator / любое TOTP-приложение
        </p>

        {step==='idle' && (!enabled
          ? <button className="btn btn-primary" onClick={startSetup} disabled={loading}>{loading?<span className="spin spin-sm"/>:<><I.Shield/> Включить 2FA</>}</button>
          : <button className="btn btn-danger" onClick={()=>setStep('disable')}><I.X/> Отключить 2FA</button>
        )}

        {step==='setup' && data && (<div>
          <div style={{background:'var(--bg3)',border:'1px solid var(--b1)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:12,color:'var(--t2)',lineHeight:1.9}}>
            1. Открой Google Authenticator<br/>
            2. Нажми "+" → "Сканировать QR-код"<br/>
            3. Введи 6-значный код для подтверждения
          </div>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{display:'inline-block',padding:16,background:'#fff',borderRadius:12}}
              ref={el=>{if(el&&el.children.length===0&&typeof QRCode!=='undefined'){new QRCode(el,{text:data.qr,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});}}}/>
          </div>
          <div style={{background:'var(--bg3)',border:'1px solid var(--b1)',borderRadius:9,padding:'10px 14px',marginBottom:16,fontFamily:'var(--mono)',fontSize:12,color:'var(--cy)',wordBreak:'break-all',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Секрет (если QR не работает):</div>
            {data.secret}
          </div>
          <div className="form-group"><label className="form-label">Код подтверждения</label>
            <input className="form-input totp-code-input" type="text" inputMode="numeric" placeholder="——————"
              value={verify} maxLength={6} onChange={e=>setVerify(e.target.value.replace(/\D/g,''))} autoFocus/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={()=>{setStep('idle');setData(null);}}>Отмена</button>
            <button className="btn btn-primary" onClick={confirmEnable} disabled={loading||verify.length!==6} style={{flex:1,justifyContent:'center'}}>
              {loading?<span className="spin spin-sm"/>:<><I.Check/> Подтвердить и включить</>}
            </button>
          </div>
        </div>)}

        {step==='disable' && (<div>
          <div style={{background:'rgba(251,113,133,0.05)',border:'1px solid rgba(251,113,133,0.15)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:13,color:'var(--re)'}}>
            Введи текущий код из приложения для отключения 2FA
          </div>
          <div className="form-group"><label className="form-label">Код из приложения</label>
            <input className="form-input totp-code-input" type="text" inputMode="numeric" placeholder="——————"
              value={disable} maxLength={6} onChange={e=>setDisable(e.target.value.replace(/\D/g,''))} autoFocus/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={()=>setStep('idle')}>Отмена</button>
            <button className="btn btn-danger" onClick={confirmDisable} disabled={loading||disable.length!==6} style={{flex:1,justifyContent:'center'}}>
              {loading?<span className="spin spin-sm"/>:<><I.X/> Отключить 2FA</>}
            </button>
          </div>
        </div>)}
      </div>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────── */
function App() {
  const [authed, setAuthed] = useState(!!getToken());
  const [page, setPage] = useState('dashboard');
  const [nodes, setNodes] = useState([]);
  const [selNode, setSelNode] = useState(null);      // for users page
  const [selNodeView, setSelNodeView] = useState(null); // for node detail page
  const [panelVersion, setPanelVersion] = useState(null);
  const toasts = useToast();

  const loadNodes = useCallback(async () => {
    try { const n = await api('GET','/api/nodes'); setNodes(n||[]); } catch {}
  }, []);

  const loadCounts = useCallback(async (list) => {
    try {
      const wc = await Promise.all(list.map(async n => {
        try { const u = await api('GET',`/api/nodes/${n.id}/users`); return {...n,_userCount:u.length}; }
        catch { return {...n,_userCount:0}; }
      }));
      setNodes(wc);
    } catch {}
  }, []);

  useEffect(() => {
    api('GET', '/api/version')
      .then(r => setPanelVersion(r.version ? (r.version.startsWith('v') ? r.version : `v${r.version}`) : null))
      .catch(() => {});
  }, []);

  useEffect(()=>{ if(authed) loadNodes(); },[authed]);
  useEffect(()=>{ if(nodes.length&&!nodes[0]._userCount) loadCounts(nodes); },[nodes]);

  const nav = (p) => { setPage(p); setSelNode(null); setSelNodeView(null); };
  const selectNode = (n) => { setSelNode(n); setPage('users'); };
  const openNodeView = (n) => { setSelNodeView(n); setPage('node'); };

  const NAV = [
    { id:'dashboard', icon:<I.LayoutDash/>, label:'Дашборд' },
    { id:'nodes',     icon:<I.Server/>,     label:'Ноды' },
    { id:'users',     icon:<I.Users/>,      label:'Клиенты' },
    { id:'settings',  icon:<I.Settings/>,   label:'Настройки' },
  ];

  if(!authed) return <><Login onLogin={t=>{setToken(t);setAuthed(true);}}/><Toasts list={toasts}/></>;

  return (
    <div className="app">
      <aside className="sidebar" id="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon"><I.Zap/></div>
          <div className="logo-texts">
            <div className="logo-name">MTG Panel</div>
            <div className="logo-sub">{panelVersion || 'adminpanel'}</div>
          </div>
        </div>

        <nav className="nav">
          <div className="nav-section">Навигация</div>
          {NAV.map(item => (
            <div key={item.id} className={`nav-item ${(page===item.id||(page==='node'&&item.id==='nodes'))?'active':''}`} onClick={()=>nav(item.id)}>
              {item.icon}{item.label}
            </div>
          ))}
        </nav>

        <VersionBlock nodes={nodes} panelVersion={panelVersion}/>

        <div className="sidebar-footer">
          <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:8}}
            onClick={()=>{setToken('');setAuthed(false);}}>
            <I.LogOut/> Выйти
          </button>
        </div>
      </aside>

      <main className="main">
        {page==='dashboard' && <Dashboard nodes={nodes} onSelectNode={openNodeView} onManageNode={selectNode}/>}
        {page==='nodes'     && <NodesPage nodes={nodes} onReload={loadNodes} onManage={selectNode} onOpenNode={openNodeView}/>}
        {page==='node'      && selNodeView && <NodePage node={selNodeView} onBack={()=>{setPage('nodes');setSelNodeView(null);}} onManage={selectNode} onReload={loadNodes}/>}
        {page==='users' && !selNode && <AllUsers nodes={nodes} onSelectNode={selectNode}/>}
        {page==='users' && selNode  && <UsersPage node={selNode} onBack={()=>{setSelNode(null);setPage('users');}}/>}
        {page==='settings'  && <Settings/>}
      </main>

      <nav className="mobile-bar">
        {NAV.map(item => (
          <div key={item.id} className={`mob-item ${page===item.id?'active':''}`} onClick={()=>nav(item.id)}>
            {item.icon}<span className="mob-label">{item.label}</span>
          </div>
        ))}
      </nav>

      <Toasts list={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
